name: Build check node app

on:
  workflow_call:
    inputs:
      NODE_VER:
        required: false
        type: string
        default: '18.x'

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: ${{ inputs.NODE_VER }}
      - name: Autentiser med GitHub NPM registry
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.READER_TOKEN }}" >> ~/.npmrc
          echo "@navikt:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - name: Install npm dependencies
        run: npm install
      - name: Build application
        run: npm run build
        env:
          IMAGE_PROXY_URL: 'Test'
          CDN_URL: 'Test'
          RUNTIME_ENVIRONMENT: 'Test'
      - name: Run linting
        run: npm run lint
