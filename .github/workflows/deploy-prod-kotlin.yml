name: Deploy kotlin app to prod

on:
  workflow_call:
    inputs:
      NAIS_RESOURCE:
        required: false
        type: string
        default: "nais.yml"
      NAIS_VARS:
        required: false
        type: string
        default: "nais-prod.json"
env:
  VERSION_TAG: ${{ github.event.release.tag_name }}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: 'prod-gcp'
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
        with:
          fetch-depth: 0
          ref: ${{ env.VERSION_TAG }}
      - name: pre-production
        uses: navikt/mime-deploy/actions/kotlin/pre-production@fcb0afee9a97138ca13f4d4e6c01186da6999b93
        env:
          TEAM: 'teamdigihot'
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        name: deploy to prod
        env:
          CLUSTER: 'prod-gcp'
          RESOURCE: ${{ inputs.NAIS_RESOURCE }}
          VARS: ${{ inputs.NAIS_VARS }}
      - name: post-production
        uses: navikt/mime-deploy/actions/kotlin/post-production@fcb0afee9a97138ca13f4d4e6c01186da6999b93
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
